        function submitTransaction() {
            const btn = document.getElementById('btnSubmitTrx');
            const rawQty = document.getElementById('frmQty').value;
            
            const payload = {
                kode: document.getElementById('frmKodeBahan').value.trim(), 
                nama: document.getElementById('frmNamaBahan').value.trim(),
                kategori: document.getElementById('frmKategori').value, 
                qty: State.transactionType === 'outbound' ? "-" + rawQty : rawQty,
                satuan: document.getElementById('frmSatuan').value, 
                lot: document.getElementById('frmLot').value || '-',
                produksi: document.getElementById('frmProd').value || '-', 
                exp: document.getElementById('frmExp').value || '-',
                petugas: State.user.name, 
                resto: document.getElementById('frmResto').value 
            };

            if(!payload.kode) return Swal.fire('Oops...', 'Pilih Kode/Nama Bahan atau Scan Barcode terlebih dahulu!', 'warning');
            if(!payload.nama || !rawQty) return Swal.fire('Error', 'Lengkapi data bahan dan kuantitas', 'error');

            btn.disabled = true; 
            btn.innerHTML = `<div class="loader" style="width: 20px; height: 20px; border-width: 3px;"></div> <span>Memproses...</span>`;
            
            // --- OPTIMISTIC UPDATE ---
            const masterItem = State.masterData.find(m => String(m.KodeBahan).trim().toUpperCase() === String(payload.kode).toUpperCase());
            let qtyKecilInput = Math.abs(parseFloat(payload.qty));

            if(masterItem) {
                if(String(payload.satuan).toUpperCase() === String(masterItem.SatuanBesar).toUpperCase()) {
                    qtyKecilInput = qtyKecilInput * parseFloat(masterItem.Konversi);
                }

                let stockItemIndex = State.stockData.findIndex(s => {
                    let k = String(s.KodeBahan || '').trim().toUpperCase();
                    let r = String(s.Resto || '').trim().toUpperCase();
                    let l = String(s.KodeLot || '-').trim().toUpperCase();
                    let p = String(s.KodeProduksi || '-').trim().toUpperCase();
                    let e = String(s.ExpDate || '-').trim().toUpperCase();

                    let pk = String(payload.kode || '').trim().toUpperCase();
                    let pr = String(payload.resto || '').trim().toUpperCase();
                    let pl = String(payload.lot || '-').trim().toUpperCase();
                    let pp = String(payload.produksi || '-').trim().toUpperCase();
                    let pe = String(payload.exp || '-').trim().toUpperCase();
                    
                    return k === pk && r === pr && l === pl && p === pp && e === pe;
                });

                if (stockItemIndex > -1) {
                    let currentQty = parseFloat(String(State.stockData[stockItemIndex].QtyKecil).replace(/[^0-9.-]+/g,"")) || 0;
                    let newQtyKecil = State.transactionType === 'inbound' ? currentQty + qtyKecilInput : currentQty - qtyKecilInput;
                    
                    if (State.transactionType === 'outbound' && newQtyKecil < 0) {
                        btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>Submit Data</span>`;
                        return Swal.fire('Error', 'Stock fisik tidak mencukupi untuk jumlah pengeluaran ini!', 'error');
                    }

                    payload.newQtyKecil = newQtyKecil + ' ' + masterItem.SatuanKecil;
                    payload.newQtyBesar = (newQtyKecil / parseFloat(masterItem.Konversi)).toFixed(2) + ' ' + masterItem.SatuanBesar;
                    payload.isDepleted = newQtyKecil <= 0;

                    if (newQtyKecil > 0) {
                        State.stockData[stockItemIndex].QtyKecil = payload.newQtyKecil;
                        State.stockData[stockItemIndex].QtyBesar = payload.newQtyBesar;
                    } else {
                        State.stockData.splice(stockItemIndex, 1);
                    }
                } else if (State.transactionType === 'inbound') {
                    payload.newQtyKecil = qtyKecilInput + ' ' + masterItem.SatuanKecil;
                    payload.newQtyBesar = (qtyKecilInput / parseFloat(masterItem.Konversi)).toFixed(2) + ' ' + masterItem.SatuanBesar;
                    payload.isNewStock = true;

                    State.stockData.push({
                        KodeBahan: payload.kode, NamaBahan: payload.nama, Kategori: payload.kategori, Resto: payload.resto,
                        QtyBesar: payload.newQtyBesar, QtyKecil: payload.newQtyKecil,
                        KodeLot: payload.lot, KodeProduksi: payload.produksi, ExpDate: payload.exp
                    });
                } else {
                    btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>Submit Data</span>`;
                    return Swal.fire('Error', 'Data Stock tidak ditemukan untuk kombinasi Batch ini!', 'error');
                }
            } else {
                btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>Submit Data</span>`;
                return Swal.fire('Error', 'Kode Bahan tidak ada di Master Data!', 'error');
            }

            runGas('saveTransaction', State.transactionType, payload).then(res => {
                syncLocalState(res, false); 

                btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>Submit Data</span>`;
                Swal.fire({icon: 'success', title: 'Tersimpan!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                
                resetFormUI();
                
                if (State.user.role === 'Admin') document.getElementById('frmResto').value = payload.resto;
                else document.getElementById('frmResto').value = State.user.resto;

                initScanHistory();
            }).catch(e => { 
                btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>Submit Data</span>`; 
                Swal.fire('Error', 'Gagal memproses transaksi.', 'error');
            });
        }

        function filterScanHistory() {
            const h = State.transactionType === 'inbound' ? State.inHistory : State.outHistory;
            const sDate = document.getElementById('scanHistStartDate').value;
            const eDate = document.getElementById('scanHistEndDate').value;
            const cat = document.getElementById('scanHistCategory').value;
            const selRestos = (State.user.role === 'Admin' || State.user.role === 'Admin Warehouse') ? State.selectedRestosScan : [State.user.resto];
            const searchInput = document.getElementById('scanHistSearch');
            const searchVal = searchInput ? searchInput.value.toLowerCase() : '';

            State.scanHistFiltered = h.filter(r => {
                let matchDate = true; let matchCat = true; let matchResto = true; let matchSearch = true;
                const rDate = r.Tanggal.split(' ')[0];
                if(sDate && rDate < sDate) matchDate = false;
                if(eDate && rDate > eDate) matchDate = false;
                if(cat && r.Kategori !== cat) matchCat = false;
                if(selRestos.length > 0 && !selRestos.includes(r.Resto)) matchResto = false;
                
                if(searchVal) {
                    const combinedStr = `${r.KodeBahan} ${r.NamaBahan} ${r.Petugas} ${r.KodeLot || ''} ${r.KodeProduksi || ''}`.toLowerCase();
                    if(!combinedStr.includes(searchVal)) matchSearch = false;
                }
                
                return matchDate && matchCat && matchResto && matchSearch;
            });
            State.scanHistFiltered = State.scanHistFiltered.sort((a,b)=>new Date(b.Tanggal)-new Date(a.Tanggal));
            State.scanHistPage = 1; renderScanHistory();
        }

        function initScanHistory() {
            filterScanHistory();
        }

        function loadDataTableView(container, viewId) {
            container.appendChild(document.getElementById('tpl-datatable').content.cloneNode(true));

            let headers = [];
            let dataList = [];

            if (viewId === 'database') {
                document.getElementById('tableTitle').textContent = "Database Stock Realtime";
                document.getElementById('tableSubtitle').textContent = "Pantau dan kelola ketersediaan stock.";

                dataList = (State.user.role === 'Admin' || State.user.role === 'Admin Warehouse') ? State.stockData : State.stockData.filter(s => s.Resto === State.user.resto);
            } 
            else if (viewId === 'expired') {
                document.getElementById('tableTitle').textContent = "Warning Expired Bahan";
                document.getElementById('tableSubtitle').textContent = "Daftar bahan yang mendekati atau melewati kadaluarsa.";
                headers = ['Kode Bahan', 'Bahan & Batch', 'Kategori', 'Stock', 'Exp Date', 'Sisa Waktu', 'Status', 'Resto', 'Aksi'];
                
                const today = new Date();
                const processed = State.stockData.filter(s => s.ExpDate && s.ExpDate !== '-').map(s => {
                    const expD = new Date(s.ExpDate);
                    const diffDays = Math.ceil((expD - today) / (1000 * 60 * 60 * 24));
                    let status = 'Aman';
                    if (diffDays <= 0) status = 'Expired'; else if (diffDays <= 30) status = 'Warning';
                    return {...s, SisaHari: diffDays, Status: status};
                });
                processed.sort((a,b) => a.SisaHari - b.SisaHari);
                dataList = (State.user.role === 'Admin' || State.user.role === 'Admin Warehouse') ? processed : processed.filter(s => s.Resto === State.user.resto);

        function filterTable() {
            const wrap = document.getElementById('wrapDataTable');
            if(wrap) wrap.classList.add('updating');

            setTimeout(() => {
                const t = document.getElementById('searchInput').value.toLowerCase();
                const cat = document.getElementById('filterCategory').value;
                const sDate = document.getElementById('filterStartDate').value;
                const eDate = document.getElementById('filterEndDate').value;
                const selRestos = (State.user.role === 'Admin' || State.user.role === 'Admin Warehouse') ? State.selectedRestosData : [State.user.resto];
                
                State.filteredData = State.tableData.filter(r => {
                    let sMatch = Object.values(r).some(v => String(v).toLowerCase().includes(t));
                    let cMatch = cat ? (r.Kategori === cat) : true;
                    let rMatch = (selRestos.length === 0) || selRestos.includes(r.Resto);
                    let dMatch = true;
                    
                    let compareDate = r.Tanggal ? r.Tanggal.split(' ')[0] : r.ExpDate;
                    if(compareDate && compareDate !== '-') {
                        if(sDate && compareDate < sDate) dMatch = false;
                        if(eDate && compareDate > eDate) dMatch = false;
                    }

                    return sMatch && cMatch && rMatch && dMatch;
                });
                State.currentPage = 1; renderTableBody();
                if(wrap) wrap.classList.remove('updating');
            }, 300);
        }

        // --- EXPORT PDF & EXCEL FUNCTION ---
        function exportTable(format) {
            let dataToExport = [];
            let view = State.currentView;

            if (view === 'inbound' || view === 'outbound') {
                dataToExport = State.scanHistFiltered;
            } else {
                dataToExport = State.filteredData;
            }

            if(!dataToExport || dataToExport.length === 0) return Swal.fire('Info', 'Tidak ada data untuk diekspor', 'info');
            
            let title = "Laporan Database Stock";
            let headers = [];
            let body = [];

            if(view === 'database') {
                title = "Laporan Database Stock";
                headers = [['Kode Bahan', 'Nama Bahan', 'Kategori', 'Stock Kecil', 'Stock Besar', 'Kode Lot', 'Kode Produksi', 'Exp Date', 'Resto']];
                body = dataToExport.map(r => [r.KodeBahan, r.NamaBahan, r.Kategori, r.QtyKecil, r.QtyBesar, r.KodeLot, r.KodeProduksi, r.ExpDate, r.Resto]);
            } else if (view === 'expired') {
                title = "Laporan Warning Expired Bahan";
                headers = [['Kode Bahan', 'Nama Bahan', 'Kategori', 'Kode Lot', 'Kode Produksi', 'Stock Besar', 'Exp Date', 'Sisa Waktu', 'Status', 'Resto']];
                body = dataToExport.map(r => [r.KodeBahan, r.NamaBahan, r.Kategori, r.KodeLot, r.KodeProduksi, r.QtyBesar, r.ExpDate, r.SisaHari + ' Hari', r.Status, r.Resto]);
            } else if (view === 'adjustment') {
                title = "Laporan Data Adjustment";
                headers = [['Tanggal', 'Kode Bahan', 'Nama Bahan', 'Kode Lot', 'Kode Produksi', 'Sys Qty', 'Fisik Qty', 'Alasan', 'Pengaju', 'Status', 'Resto']];
                body = dataToExport.map(r => [r.Tanggal, r.KodeBahan, r.NamaBahan, r.KodeLot, r.KodeProduksi, r.QtySystem, r.QtyFisik + ' ' + r.Satuan, r.Alasan, r.Pengaju, r.Status, r.Resto]);
            } else if (view === 'inbound' || view === 'outbound') {
                title = view === 'inbound' ? "Laporan Riwayat Barang Masuk" : "Laporan Riwayat Barang Keluar";
                headers = [['Tanggal', 'Kode Bahan', 'Nama Bahan', 'Kategori', 'Qty', 'Satuan', 'Lot/Prod/Exp', 'Petugas', 'Resto']];
                body = dataToExport.map(r => [
                    r.Tanggal, 
                    r.KodeBahan, 
                    r.NamaBahan, 
                    r.Kategori, 
                    Math.abs(parseFloat(r.Qty)), 
                    r.Satuan, 
                    `L:${r.KodeLot || '-'} P:${r.KodeProduksi || '-'} E:${r.ExpDate || '-'}`, 
                    r.Petugas, 
                    r.Resto
                ]);
            }

            const fileName = `${title.replace(/ /g, '_')}_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}`;

            if(format === 'pdf') {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(14);
                doc.text(title, 14, 15);
                doc.setFontSize(10);
                doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 22);
                doc.text(`Oleh: ${State.user.name} (${State.user.role}) - ${State.user.resto}`, 14, 28);

                doc.autoTable({
                    startY: 35,
                    head: headers,
                    body: body,
                    theme: 'grid',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [37, 99, 235] }
                });

                const finalY = doc.lastAutoTable.finalY || 35;
                doc.text("Dicetak oleh,", 140, finalY + 20);
                doc.text(State.user.name, 140, finalY + 40);
                doc.line(140, finalY + 41, 190, finalY + 41);
                doc.text(State.user.role, 140, finalY + 46);

                doc.save(fileName + '.pdf');
                Swal.fire({icon: 'success', title: 'Export Berhasil', text: 'File PDF berhasil diunduh.', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000});
            } else if (format === 'excel') {
                let csvContent = headers[0].join(";") + "\n";
                body.forEach(row => {
                    let rowStr = row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(";");
                    csvContent += rowStr + "\n";
                });
                
                const blob = new Blob(["\uFEFF"+csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                if (link.download !== undefined) {
                    const url = URL.createObjectURL(blob);
                    link.setAttribute("href", url);
                    link.setAttribute("download", fileName + ".csv");
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
                Swal.fire({icon: 'success', title: 'Export Berhasil', text: 'File Excel (CSV) berhasil diunduh.', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000});
            }
        }

                `,

                    return {
                        kode: kode, resto: resto, oldLot: lot, oldProduksi: prod, oldExp: exp,

                        qtyBesar: document.getElementById('editQtyBesar').value,

                    }

                if(res.isConfirmed) {
                    const newData = res.value;

                    // 1. Optimistic Update
                    const stockIndex = State.stockData.findIndex(s => s.KodeBahan === kode && s.Resto === resto && s.KodeLot === lot && s.KodeProduksi === prod && s.ExpDate === exp);
                    if (stockIndex > -1) {
                        State.stockData[stockIndex].QtyKecil = newData.qtyKecil;
                        State.stockData[stockIndex].QtyBesar = newData.qtyBesar;
                        State.stockData[stockIndex].KodeLot = newData.lot;
                        State.stockData[stockIndex].KodeProduksi = newData.produksi;
                        State.stockData[stockIndex].ExpDate = newData.exp;
                    }
                    
                    const tableIndex = State.tableData.findIndex(s => s.KodeBahan === kode && s.Resto === resto && s.KodeLot === lot && s.KodeProduksi === prod && s.ExpDate === exp);
                    if (tableIndex > -1) {
                        State.tableData[tableIndex].QtyKecil = newData.qtyKecil;
                        State.tableData[tableIndex].QtyBesar = newData.qtyBesar;
                        State.tableData[tableIndex].KodeLot = newData.lot;

                        Swal.fire('Warning', 'Koneksi ke server lambat, namun data di tampilan telah diperbarui.', 'warning');
                    });
                }
            })
        }
        function deleteStock(kode, resto, lot, prod, exp) {
            Swal.fire({
                title: 'Hapus Data Stock?',
                text: "Data stock ini akan dihapus secara permanen dari sistem!",
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ya, Hapus'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Optimistic Update
                    State.stockData = State.stockData.filter(s => !(s.KodeBahan === kode && s.Resto === resto && s.KodeLot === lot && s.KodeProduksi === prod && s.ExpDate === exp));
                    State.tableData = State.tableData.filter(s => !(s.KodeBahan === kode && s.Resto === resto && s.KodeLot === lot && s.KodeProduksi === prod && s.ExpDate === exp));
                    
                    filterTable();
                    
                    Swal.fire({icon: 'success', title: 'Terhapus!', text: 'Data stock telah dihapus.', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                    
                    runGas('deleteStockData', {kode, resto, lot, produksi: prod, exp}).then(d => { 
                        syncLocalState(d, true); // Keep local modifications
                    }).catch(e => {
                        console.error("Gagal sinkronisasi dengan server:", e);
                    });
                }
            })
        }

                title: 'Detail Adjustment',
                html: `<div class="text-left space-y-2 mt-4 p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <p><span class="text-slate-500 text-sm">ID Pengajuan:</span> <br><b class="font-mono text-slate-800">${adj.ID}</b></p>
                    <p><span class="text-slate-500 text-sm">Tanggal:</span> <br><b>${adj.Tanggal}</b></p>
                    <p><span class="text-slate-500 text-sm">Bahan:</span> <br><b>${adj.KodeBahan} - ${adj.NamaBahan}</b></p>
                    <p><span class="text-slate-500 text-sm">Batch:</span> <br><b class="font-mono text-blue-600">L:${adj.KodeLot || '-'}, P:${adj.KodeProduksi || '-'}, E:${adj.ExpDate || '-'}</b></p>
                    <p><span class="text-slate-500 text-sm">Stock System (Awal):</span> <br><b>${adj.QtySystem}</b></p>
                    <p><span class="text-slate-500 text-sm">Stock Fisik (Penyesuaian):</span> <br><b class="text-blue-600 text-lg">${adj.QtyFisik} ${adj.Satuan}</b></p>
                    <p><span class="text-slate-500 text-sm">Alasan:</span> <br><b>${adj.Alasan}</b></p>
                    <p><span class="text-slate-500 text-sm">Diajukan Oleh:</span> <br><b>${adj.Pengaju} (${adj.Resto})</b></p>
                    <p><span class="text-slate-500 text-sm">Status:</span> <br><b class="${stColor}">${adj.Status}</b></p>
                </div>`,
                showConfirmButton: true, confirmButtonText: 'Tutup', customClass: { popup: 'rounded-2xl' }
            });
        }

        function approveAdj(id) {
            Swal.fire({title:'Approve Data?', text:'Stock database akan langsung berubah sesuai dengan Qty Fisik.', icon:'warning', showCancelButton:true, confirmButtonColor:'#10b981', confirmButtonText:'Ya, Approve'}).then(r => {
                if(r.isConfirmed) {
                    Swal.fire({title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    runGas('approveAdjustment', id).then(d => { 
                        if(d) syncLocalState(d); 
                        navigate('adjustment'); 
                        Swal.fire('Approved!', '', 'success'); 
                    }).catch(e => {
                        Swal.fire('Error', 'Gagal memproses approval.', 'error');
                    });
                }
            });
        }
        function rejectAdj(id) {
            Swal.fire({title:'Reject Data?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Ya, Reject'}).then(r => {
                if(r.isConfirmed) {
                    Swal.fire({title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    runGas('rejectAdjustment', id).then(d => { 
                        if(d) syncLocalState(d); 
                        navigate('adjustment'); 
                        Swal.fire('Rejected!', '', 'success'); 
                    }).catch(e => {
                        Swal.fire('Error', 'Gagal memproses penolakan.', 'error');
                    });
                }
            });
        }

        // --- SETTINGS LOGIC ---
        function loadSettingsView(container) {
            container.appendChild(document.getElementById('tpl-settings').content.cloneNode(true));
            document.getElementById('setAppTitle').value = State.settings.app_title || '';
            document.getElementById('setAppCopy').value = State.settings.copyright || '';
            document.getElementById('setAppLogo').value = State.settings.logo_url || '';
            document.getElementById('setAdminEmail').value = State.settings.admin_email || '';
            
            const selOptions = State.restos.map(r=>`<option value="${r}">${r}</option>`).join('');
            document.querySelectorAll('.set-resto-select').forEach(sel => sel.innerHTML = selOptions);
            
            renderRestoTable(); renderUserTable(); renderMasterTable(); toggleUserFields();
        }
        function switchSetTab(t) {
            ['app','resto','user','master'].forEach(x => {
                document.getElementById(`setTab-${x}`).classList.add('hidden');
                document.getElementById(`tabBtn-${x}`).className = "px-4 py-2 text-sm font-medium rounded-lg text-slate-500 hover:bg-slate-50 whitespace-nowrap";
            });
            document.getElementById(`setTab-${t}`).classList.remove('hidden');
            document.getElementById(`tabBtn-${t}`).className = "px-4 py-2 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 whitespace-nowrap";
        }

        function saveAppSet() {
            Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            runGas('saveSettingsData', { 
                app_title: document.getElementById('setAppTitle').value, 
                copyright: document.getElementById('setAppCopy').value, 
                logo_url: document.getElementById('setAppLogo').value,
                admin_email: document.getElementById('setAdminEmail').value
            }).then(d => { 
                if(d) syncLocalState(d); 
                applySettings(); 
                Swal.fire({icon: 'success', title: 'Tersimpan', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500}); 
            }).catch(e => {
                Swal.fire('Error', 'Gagal menyimpan pengaturan aplikasi. Pastikan koneksi API aktif.', 'error');
            });
        }

        function saveNewResto() {
            const val = document.getElementById('setNewResto').value; if(!val) return;
            Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            // Optimistic update
            State.restos.push(val);
            document.getElementById('setNewResto').value=''; 
            renderRestoTable();

            runGas('addResto', val).then(d => { 
                if(d) syncLocalState(d); 
                document.querySelectorAll('.set-resto-select').forEach(sel => sel.innerHTML = State.restos.map(r=>`<option value="${r}">${r}</option>`).join(''));
                renderRestoTable(); 
                Swal.fire({icon: 'success', title: 'Tersimpan', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500}); 
            }).catch(e => {
                refreshGlobalData(); // Rollback jika gagal
                Swal.fire('Error', 'Gagal menambah resto.', 'error');
            });
        }

        function deleteRestoItem(idx) {
            Swal.fire({title: 'Hapus Data Resto?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Hapus', confirmButtonColor: '#ef4444'}).then(r => {
                if(r.isConfirmed) {
                    Swal.fire({title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    runGas('deleteResto', idx).then(d=>{
                        if(d) syncLocalState(d);
                        renderRestoTable();
                        document.querySelectorAll('.set-resto-select').forEach(sel => sel.innerHTML = State.restos.map(r=>`<option value="${r}">${r}</option>`).join(''));
                        Swal.fire({icon: 'success', title: 'Terhapus', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                    }).catch(e => { Swal.fire('Error', 'Gagal menghapus resto', 'error'); });
                }
            });
        }

        function renderRestoTable() {
            document.getElementById('tblRestoList').innerHTML = State.restos.map((r,i)=>`<tr class="hover:bg-slate-50"><td class="px-5 py-3">${r}</td><td class="px-5 py-3 text-center"><button onclick="deleteRestoItem(${i})" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('');
        }

        function toggleUserFields() {
            const role = document.getElementById('setUserRole').value;
            const wR = document.getElementById('wrapResto'); const login = document.getElementById('setUserLogin');
            if(role === 'Admin' || role === 'Admin Warehouse') { wR.classList.add('hidden'); login.disabled=false; login.classList.remove('bg-slate-100'); }
            else { wR.classList.remove('hidden'); login.disabled=(role==='Store Manager'); if(role==='Store Manager'){ login.value=document.getElementById('setUserResto').value; login.classList.add('bg-slate-100'); }else{ login.disabled=false; login.classList.remove('bg-slate-100');} }
        }
        document.addEventListener('change', e => { if(e.target.id==='setUserResto' && document.getElementById('setUserRole').value==='Store Manager') document.getElementById('setUserLogin').value=e.target.value; });
        
        function saveNewUser() {
            const payload = { 
                id: 'U'+Date.now(), 
                name: document.getElementById('setUserName').value, 
                username: document.getElementById('setUserLogin').value, 
                pass: document.getElementById('setUserPass').value, 
                role: document.getElementById('setUserRole').value, 
                resto: (document.getElementById('setUserRole').value==='Admin' || document.getElementById('setUserRole').value==='Admin Warehouse') ? 'Semua Resto' : document.getElementById('setUserResto').value 
            };
            
            if(!payload.name || !payload.username || !payload.pass) return Swal.fire('Peringatan', 'Harap isi Nama, Username, dan Password!', 'warning');

            Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            // Optimistic Update
            State.users.push({ID: payload.id, Nama: payload.name, Username: payload.username, Password: payload.pass, Role: payload.role, Resto: payload.resto});
            renderUserTable();
            document.getElementById('setUserName').value=''; document.getElementById('setUserLogin').value=''; document.getElementById('setUserPass').value='';

            runGas('saveUser', payload).then(d=>{ 
                if(d) syncLocalState(d); 
                renderUserTable(); 
                Swal.fire({icon: 'success', title: 'Tersimpan', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500}); 
            }).catch(e => {
                refreshGlobalData();
                Swal.fire('Error', 'Gagal menyimpan pengguna baru.', 'error');
            });
        }

        function deleteUserItem(idx) {
            Swal.fire({title: 'Hapus Pengguna?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Hapus', confirmButtonColor: '#ef4444'}).then(r => {
                if(r.isConfirmed) {
                    Swal.fire({title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    runGas('deleteUser', idx).then(d=>{
                        if(d) syncLocalState(d);
                        renderUserTable();
                        Swal.fire({icon: 'success', title: 'Terhapus', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                    }).catch(e => { Swal.fire('Error', 'Gagal menghapus pengguna.', 'error'); });
                }
            });
        }

        function renderUserTable() {
            document.getElementById('tblUserList').innerHTML = State.users.map((u,i)=>`<tr><td class="px-5 py-2">${u.Nama}</td><td class="px-5 py-2">${u.Username}</td><td class="px-5 py-2 font-mono text-slate-500">${u.Password}</td><td class="px-5 py-2">${u.Role}</td><td class="px-5 py-2">${u.Resto}</td><td class="px-5 py-2 text-center flex justify-center gap-1">
                <button onclick="viewUser(${i})" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded" title="View Detail"><i class="fa-solid fa-eye"></i></button>
                <button onclick="editUser(${i})" class="text-amber-500 hover:bg-amber-50 px-2 py-1 rounded" title="Edit Pengguna"><i class="fa-solid fa-pen"></i></button>
                <button onclick="deleteUserItem(${i})" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded" title="Hapus"><i class="fa-solid fa-trash"></i></button>
            </td></tr>`).join('');
        }

        function viewUser(idx) {
            const u = State.users[idx];
            Swal.fire({ title: 'Detail Pengguna', html: `<div class="text-left space-y-2 mt-4"><p><span class="text-slate-500 text-sm">Nama Lengkap:</span> <br><b>${u.Nama}</b></p><p><span class="text-slate-500 text-sm">Username:</span> <br><b>${u.Username}</b></p><p><span class="text-slate-500 text-sm">Password:</span> <br><b>${u.Password}</b></p><p><span class="text-slate-500 text-sm">Role Akses:</span> <br><b>${u.Role}</b></p><p><span class="text-slate-500 text-sm">Asal Resto:</span> <br><b>${u.Resto}</b></p></div>`, showConfirmButton: true, confirmButtonText: 'Tutup' });
        }

        function editUser(idx) {
            const u = State.users[idx];
            document.getElementById('setUserRole').value = u.Role; toggleUserFields();
            document.getElementById('setUserName').value = u.Nama;
            document.getElementById('setUserLogin').value = u.Username;
            document.getElementById('setUserPass').value = u.Password;
            if(u.Role !== 'Admin' && u.Role !== 'Admin Warehouse') document.getElementById('setUserResto').value = u.Resto;
            
            Swal.fire({title: 'Mempersiapkan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            runGas('deleteUser', idx).then(d => { 
                if(d) syncLocalState(d); 
                renderUserTable(); 
                Swal.fire('Mode Edit', 'Data pengguna dipindahkan ke form. Silakan ubah lalu klik Buat Akun.', 'info'); 
            }).catch(e => {
                Swal.fire('Error', 'Gagal memproses mode edit.', 'error');
            });
            document.getElementById('setTab-user').scrollIntoView({behavior: 'smooth'});
        }

        // Master Data
        function saveMasterData() {
            const payload = { 
                kode: document.getElementById('setMstKode').value, 
                nama: document.getElementById('setMstNama').value, 
                kat: document.getElementById('setMstKat').value, 
                resto: document.getElementById('setMstResto').value, 
                satB: document.getElementById('setMstSatB').value, 
                satK: document.getElementById('setMstSatK').value, 
                konv: document.getElementById('setMstKonv').value 
            };

            if(!payload.kode || !payload.nama || !payload.satB || !payload.satK || !payload.konv) return Swal.fire('Peringatan', 'Harap isi kelengkapan Master Data secara penuh!', 'warning');

            Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            // Optimistic Update
            State.masterData.push({KodeBahan: payload.kode, NamaBahan: payload.nama, Kategori: payload.kat, Resto: payload.resto, SatuanBesar: payload.satB, SatuanKecil: payload.satK, Konversi: payload.konv});
            renderMasterTable();
            document.getElementById('setMstKode').value=''; document.getElementById('setMstNama').value=''; document.getElementById('setMstSatB').value=''; document.getElementById('setMstSatK').value=''; document.getElementById('setMstKonv').value='';

            runGas('saveMaster', payload).then(d=>{ 
                if(d) syncLocalState(d); 
                renderMasterTable(); 
                Swal.fire({icon: 'success', title: 'Tersimpan', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500}); 
            }).catch(e => {
                refreshGlobalData();
                Swal.fire('Error', 'Gagal menyimpan Master Data.', 'error');
            });
        }

        function deleteMasterItem(idx) {
            Swal.fire({title: 'Hapus Master Data?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Hapus', confirmButtonColor: '#ef4444'}).then(r => {
                if(r.isConfirmed) {
                    Swal.fire({title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    runGas('deleteMaster', idx).then(d=>{
                        if(d) syncLocalState(d);
                        renderMasterTable();
                        Swal.fire({icon: 'success', title: 'Terhapus', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
                    }).catch(e => { Swal.fire('Error', 'Gagal menghapus data master.', 'error'); });
                }
            });
        }

        function renderMasterTable() {
            document.getElementById('tblMasterList').innerHTML = State.masterData.map((m,i)=>`<tr>
                <td class="px-5 py-2 font-mono text-blue-600">${m.KodeBahan}</td>
                <td class="px-5 py-2">
                    <div class="font-medium text-slate-800">${m.NamaBahan}</div>
                    <div class="text-[10px] text-slate-500 mt-0.5"><i class="fa-solid fa-store mr-1"></i>${m.Resto}</div>
                </td>
                <td class="px-5 py-2">${m.Kategori}</td>
                <td class="px-5 py-2 text-center bg-blue-50/30">1 ${m.SatuanBesar} = ${m.Konversi} ${m.SatuanKecil}</td>
                <td class="px-5 py-2 text-center flex justify-center gap-1">
                    <button onclick="viewMaster(${i})" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded" title="View Detail"><i class="fa-solid fa-eye"></i></button>
                    <button onclick="editMaster(${i})" class="text-amber-500 hover:bg-amber-50 px-2 py-1 rounded" title="Edit Master Data"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deleteMasterItem(${i})" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`).join('');
        }

        function viewMaster(idx) {
            const m = State.masterData[idx];
            Swal.fire({ title: 'Detail Master Data', html: `<div class="text-left space-y-2 mt-4"><p><span class="text-slate-500 text-sm">Kode Bahan:</span> <br><b class="font-mono text-blue-600">${m.KodeBahan}</b></p><p><span class="text-slate-500 text-sm">Nama Bahan:</span> <br><b>${m.NamaBahan}</b></p><p><span class="text-slate-500 text-sm">Kategori:</span> <br><b>${m.Kategori}</b></p><p><span class="text-slate-500 text-sm">Asal Resto:</span> <br><b>${m.Resto}</b></p><p><span class="text-slate-500 text-sm">Data Konversi:</span> <br><b>1 ${m.SatuanBesar} = ${m.Konversi} ${m.SatuanKecil}</b></p></div>`, showConfirmButton: true, confirmButtonText: 'Tutup' });
        }

        function editMaster(idx) {
            const m = State.masterData[idx];
            document.getElementById('setMstKode').value = m.KodeBahan; document.getElementById('setMstNama').value = m.NamaBahan;
            document.getElementById('setMstKat').value = m.Kategori; document.getElementById('setMstResto').value = m.Resto;
            document.getElementById('setMstSatB').value = m.SatuanBesar; document.getElementById('setMstSatK').value = m.SatuanKecil;
            document.getElementById('setMstKonv').value = m.Konversi;
            
            Swal.fire({title: 'Mempersiapkan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            runGas('deleteMaster', idx).then(d => { 
                if(d) syncLocalState(d); 
                renderMasterTable(); 
                Swal.fire('Mode Edit', 'Data bahan dipindahkan ke form input di atas. Silakan ubah lalu klik Simpan Master Data.', 'info'); 
            }).catch(e => { Swal.fire('Error', 'Gagal memproses mode edit', 'error'); });
            document.getElementById('setTab-master').scrollIntoView({behavior: 'smooth'});
        }

    </script>
</body>
</html>
