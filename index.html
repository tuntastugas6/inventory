<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indi Apps V2.0</title>
    <!-- Dynamic Favicon -->
    <link id="dynamicFavicon" rel="icon" type="image/png" href="https://s6.imgcdn.dev/YfkbUy.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jsPDF for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <!-- HTML5 QRCode Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .menu-active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; font-weight: 600;}
        
        /* Mobile Bottom Nav styles */
        @media (max-width: 768px) {
            .mobile-nav-active { color: #2563eb; }
            .content-area { padding-bottom: 110px !important; }
        }
        
        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Smooth Transitions */
        #globalLoader { transition: opacity 0.5s ease; }
        .data-fade { transition: opacity 0.3s ease-in-out; }
        .data-fade.updating { opacity: 0.3; }
        
        /* Custom Scrollbar for dropdowns */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Scanner Styles */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; border: none !important; }
        #reader video { object-fit: cover; border-radius: 8px; }
        #reader__dashboard_section_csr span { color: white !important; }
        #reader__dashboard_section_swaplink { color: #3b82f6 !important; text-decoration: none; margin-top: 10px; display: inline-block;}
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden h-[100dvh] flex relative">

    <!-- GLOBAL DATA LOADER -->
    <div id="globalLoader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white">
        <div class="loader mb-4" style="width: 40px; height: 40px; border-width: 4px;"></div>
        <h2 class="text-lg font-bold text-slate-700 animate-pulse">Menghubungkan ke Database...</h2>
        <p class="text-xs text-slate-500 mt-2">Mohon tunggu sebentar</p>
    </div>

    <!-- SCANNER MODAL (Global) -->
    <div id="scannerModal" class="hidden fixed inset-0 z-[110] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-all scale-100">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800"><i class="fa-solid fa-qrcode mr-2 text-blue-600"></i>Scan Barcode</h3>
                <button onclick="closeScanner()" class="text-slate-400 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="p-0 bg-black relative">
                <div id="reader"></div>
            </div>
            <div class="p-4 bg-slate-50 text-center text-xs text-slate-500" id="scannerInstruction">
                Arahkan kamera ke barcode/QR code. Pastikan pencahayaan cukup dan kode terlihat jelas di kotak.
            </div>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 transition-opacity duration-300">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-[90%] max-w-md transform transition-all">
            <div class="text-center mb-8">
                <img id="loginLogo" src="https://s6.imgcdn.dev/YfkbUy.png" alt="Logo" class="w-24 h-24 mx-auto mb-4 drop-shadow-lg object-contain bg-white rounded-full p-2">
                <h1 class="text-2xl font-bold text-slate-800" id="loginTitle">Inventory Login</h1>
                <p class="text-sm text-slate-500 mt-1">Silakan masuk ke akun Anda</p>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-slate-400"></i>
                        </div>
                        <input type="text" id="username" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Masukkan username">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" id="password" class="w-full pl-10 pr-10 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="flex items-center mt-3 ml-1">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer transition-colors">
                        <label for="rememberMe" class="ml-2 text-sm font-medium text-slate-600 cursor-pointer">Simpan info login</label>
                    </div>
                </div>
                <button onclick="handleLogin()" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all flex justify-center items-center gap-2">
                    <span>Masuk</span>
                </button>
            </div>
            <div class="mt-8 text-center text-xs text-slate-400" id="loginCopyright">
                &copy; 2026 Indi Apps
            </div>
        </div>
    </div>

    <!-- MAIN APP LAYOUT -->
    <div id="mainApp" class="hidden w-full h-full flex flex-col md:flex-row transition-opacity duration-300">
        <!-- SIDEBAR (Desktop) -->
        <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 h-full shadow-sm z-20">
            <div class="h-16 flex items-center px-6 border-b border-slate-100">
                <img id="appLogo" src="" alt="Logo" class="h-8 w-8 object-contain mr-3">
                <span id="appTitle" class="font-bold text-lg text-slate-800 truncate">Inventory</span>
            </div>
            <div class="flex-1 overflow-y-auto hide-scroll py-4">
                <nav class="space-y-1 px-3" id="desktopNav"></nav>
            </div>
            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-semibold text-slate-800 truncate" id="sideUserName">User</p>
                        <p class="text-xs text-slate-500 truncate" id="sideUserRole">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-right-from-bracket"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- CONTENT AREA -->
        <main class="flex-1 flex flex-col h-full bg-slate-50 relative overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-8 shrink-0 shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <div class="md:hidden flex items-center gap-2">
                        <img id="mobileAppLogo" src="" alt="Logo" class="h-8 w-8 object-contain">
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-slate-800" id="greetingText">Selamat Pagi</h2>
                        <p class="text-xs text-slate-500" id="headerRestoName">Semua Resto</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative md:hidden">
                        <button onclick="logout()" class="text-slate-500 hover:text-red-500 p-2">
                            <i class="fa-solid fa-power-off text-lg"></i>
                        </button>
                    </div>
                    <div class="hidden md:flex items-center bg-slate-100 rounded-full px-3 py-1.5">
                        <i class="fa-regular fa-clock text-slate-400 mr-2 text-sm"></i>
                        <span id="realtimeClock" class="text-sm font-medium text-slate-600">00:00:00</span>
                    </div>
                </div>
            </header>
            <div id="viewsContainer" class="flex-1 overflow-y-auto content-area p-4 lg:p-8 hide-scroll scroll-smooth"></div>
        </main>

        <!-- BOTTOM NAV (Mobile Only) -->
        <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40 pb-safe">
            <div class="flex justify-around items-center h-16" id="mobileNav"></div>
        </nav>
    </div>

    <!-- TEMPLATES -->
    <!-- 1. Dashboard -->
    <template id="tpl-dashboard">
        <div class="space-y-6 animate-fade-in pb-10 md:pb-4">
            <!-- Filter Bar -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col lg:flex-row gap-4 justify-between items-start lg:items-center">
                <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto items-start sm:items-center">
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <input type="date" id="dashFilterStartDate" onchange="refreshDashboard()" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-blue-500 outline-none w-full sm:w-auto">
                        <span class="text-slate-400 text-sm font-medium">s/d</span>
                        <input type="date" id="dashFilterEndDate" onchange="refreshDashboard()" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-blue-500 outline-none w-full sm:w-auto">
                    </div>
                    
                    <div class="relative w-full sm:w-56 admin-only-element" id="wrap-filter-resto-dash">
                        <button type="button" onclick="toggleDropdown('dd-dash-resto')" class="w-full border border-slate-300 bg-white rounded-lg px-3 py-2 text-sm text-left flex justify-between items-center outline-none focus:ring-2 focus:ring-blue-500 transition">
                            <span id="lbl-dash-resto" class="truncate font-medium text-slate-700">Semua Resto</span>
                            <i class="fa-solid fa-chevron-down ml-2 text-slate-400"></i>
                        </button>
                        <div id="dd-dash-resto" class="hidden absolute z-50 mt-1 w-full bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden transform origin-top transition-all">
                            <div class="max-h-60 overflow-y-auto p-2 space-y-1 custom-scrollbar" id="list-dash-resto"></div>
                        </div>
                    </div>
                </div>
                <button onclick="refreshGlobalData(this)" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-sm font-bold transition-colors w-full lg:w-auto flex justify-center items-center gap-2 hover:bg-blue-100">
                    <i class="fa-solid fa-rotate-right"></i> Refresh Data
                </button>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 data-fade" id="dashSummaryCards">
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-5 text-white shadow-lg shadow-emerald-500/20 relative overflow-hidden transition-all hover:-translate-y-1">
                    <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-boxes-packing text-7xl"></i></div>
                    <p class="text-emerald-100 text-sm font-medium mb-1">Total Masuk</p>
                    <div id="dashTotalInUnits" class="min-h-[3.5rem] flex flex-col justify-center">
                        <h3 class="text-3xl font-bold mb-1">0 <span class="text-sm font-normal text-white/80">Item</span></h3>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-rose-500 to-pink-600 rounded-2xl p-5 text-white shadow-lg shadow-rose-500/20 relative overflow-hidden transition-all hover:-translate-y-1">
                    <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-truck-fast text-7xl"></i></div>
                    <p class="text-rose-100 text-sm font-medium mb-1">Total Keluar</p>
                    <div id="dashTotalOutUnits" class="min-h-[3.5rem] flex flex-col justify-center">
                        <h3 class="text-3xl font-bold mb-1">0 <span class="text-sm font-normal text-white/80">Item</span></h3>
                    </div>
                </div>
                
                <!-- Kartu Khusus Store -->
                <div class="store-only-card bg-gradient-to-br from-blue-500 to-cyan-600 rounded-2xl p-5 text-white shadow-lg shadow-blue-500/20 relative overflow-hidden transition-all hover:-translate-y-1">
                    <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-snowflake text-7xl"></i></div>
                    <p class="text-blue-100 text-sm font-medium mb-1">Bahan Frozen</p>
                    <h3 class="text-3xl font-bold mb-2" id="dashFrozenCount">0 <span class="text-sm font-normal">Item</span></h3>
                    <p class="text-xs text-blue-100">Tersedia di Database</p>
                </div>
                <div class="store-only-card bg-gradient-to-br from-amber-500 to-orange-600 rounded-2xl p-5 text-white shadow-lg shadow-amber-500/20 relative overflow-hidden transition-all hover:-translate-y-1">
                    <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-box-open text-7xl"></i></div>
                    <p class="text-amber-100 text-sm font-medium mb-1">Bahan Dry</p>
                    <h3 class="text-3xl font-bold mb-2" id="dashDryCount">0 <span class="text-sm font-normal">Item</span></h3>
                    <p class="text-xs text-amber-100">Tersedia di Database</p>
                </div>

                <!-- Kartu Khusus Admin Warehouse -->
                <div class="wh-only-card hidden bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-5 text-white shadow-lg shadow-indigo-500/20 relative overflow-hidden transition-all hover:-translate-y-1">
                    <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-truck-ramp-box text-7xl"></i></div>
                    <p class="text-indigo-100 text-sm font-medium mb-1">Surat Jalan (SJ) Aktif</p>
                    <h3 class="text-3xl font-bold mb-2" id="dashSjCount">0 <span class="text-sm font-normal">Dokumen</span></h3>
                    <p class="text-xs text-indigo-100">Menunggu Diterima Store</p>
                </div>
                <div class="wh-only-card hidden bg-gradient-to-br from-sky-500 to-blue-600 rounded-2xl p-5 text-white shadow-lg shadow-sky-500/20 relative overflow-hidden transition-all hover:-translate-y-1">
                    <div class="absolute -right-4 -top-4 opacity-20"><i class="fa-solid fa-clipboard-check text-7xl"></i></div>
                    <p class="text-sky-100 text-sm font-medium mb-1">Total SJ Selesai</p>
                    <h3 class="text-3xl font-bold mb-2" id="dashSjDoneCount">0 <span class="text-sm font-normal">Dokumen</span></h3>
                    <p class="text-xs text-sky-100">Telah diterima Store</p>
                </div>
            </div>

            <!-- Charts & Recent -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                        <h3 class="font-bold text-slate-800">History Masuk & Keluar</h3>
                        <div class="flex gap-2">
                            <select id="dashChartTypeFilter" onchange="refreshDashboard()" class="text-xs border border-slate-200 bg-slate-50 text-slate-600 font-medium rounded-lg px-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-500 transition">
                                <option value="all">Masuk & Keluar</option>
                                <option value="in">Hanya Masuk</option>
                                <option value="out">Hanya Keluar</option>
                            </select>
                            <select id="dashChartFilter" onchange="refreshDashboard()" class="text-xs border border-slate-200 bg-slate-50 text-slate-600 font-medium rounded-lg px-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-500 transition">
                                <option value="today">Hari Ini</option>
                                <option value="7days" selected>7 Hari Terakhir</option>
                                <option value="1month">1 Bulan Terakhir</option>
                            </select>
                        </div>
                    </div>
                    <div class="relative h-64 w-full data-fade" id="wrapChartHistory"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                    <h3 class="font-bold text-slate-800 mb-4">Komposisi Bahan</h3>
                    <div class="relative h-48 w-full flex justify-center data-fade" id="wrapChartPie"><canvas id="pieChart"></canvas></div>
                    <div class="mt-4 flex justify-center gap-4 text-sm font-medium text-slate-600">
                        <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-blue-500 shadow-sm"></div> Frozen</div>
                        <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-amber-500 shadow-sm"></div> Dry</div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden data-fade mb-20 md:mb-0" id="wrapRecentTable">
                <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800">Riwayat Transaksi Terkini</h3>
                    <button onclick="navigate('inbound')" class="text-sm text-blue-600 font-bold hover:underline bg-blue-50 px-3 py-1.5 rounded-lg">Input Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-max">
                        <thead class="bg-slate-50 text-slate-500 border-b border-slate-100">
                            <tr><th class="px-5 py-3 font-medium">Jenis</th><th class="px-5 py-3 font-medium">Nama Bahan</th><th class="px-5 py-3 font-medium">Qty</th><th class="px-5 py-3 font-medium">Resto</th><th class="px-5 py-3 font-medium">Tanggal</th><th class="px-5 py-3 font-medium">Petugas</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="recentTableBody"></tbody>
                    </table>
                </div>
                <div class="p-4 border-t border-slate-100 flex justify-between items-center bg-white">
                    <span class="text-xs text-slate-500" id="dashRecentPageInfo">Menampilkan 0 data</span>
                    <div class="flex gap-1">
                        <button onclick="changeDashRecentPage(-1)" class="px-3 py-1 rounded bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="changeDashRecentPage(1)" class="px-3 py-1 rounded bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 2. SCANNER (Inbound / Outbound) - DROPDOWN & BARCODE -->
    <template id="tpl-scan">
        <div class="max-w-3xl mx-auto space-y-6 animate-fade-in pb-10 md:pb-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-slate-800" id="scanPageTitle">Input Barang</h2>
            </div>

            <!-- TOGGLE UNTUK INBOUND SAJA -->
            <div id="inboundModeToggle" class="hidden mb-4 p-1 bg-slate-200/70 rounded-xl flex">
                <button type="button" onclick="switchInboundMode('manual')" id="btnModeManual" class="flex-1 py-2.5 text-sm font-bold bg-white rounded-lg shadow-sm text-blue-600 transition-all">Input Manual</button>
                <button type="button" onclick="switchInboundMode('sj')" id="btnModeSj" class="flex-1 py-2.5 text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">Terima via Surat Jalan</button>
            </div>

            <!-- TAB: SURAT JALAN (INBOUND) -->
            <div id="containerInboundSj" class="hidden space-y-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                    <div class="flex gap-3 items-end">
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Cari / Scan Nomor Surat Jalan</label>
                            <input type="text" id="inboundSearchSj" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none uppercase font-mono" placeholder="Contoh: SJ-20260401-XXXX">
                        </div>
                        <button type="button" onclick="openScanner('inbound_sj')" class="bg-slate-800 text-white p-2.5 rounded-xl hover:bg-slate-700 transition" title="Scan Barcode SJ"><i class="fa-solid fa-qrcode text-lg"></i></button>
                        <button type="button" onclick="fetchSuratJalanForInbound()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-sm">Cari SJ</button>
                    </div>

                    <div id="inboundSjResult" class="hidden mt-6 border-t border-slate-100 pt-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-slate-800" id="lblInboundSjNumber">No. SJ: -</h3>
                            <span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-1 rounded">Siap Diterima</span>
                        </div>
                        <div class="overflow-x-auto border border-slate-200 rounded-xl mb-4">
                            <table class="w-full text-left text-sm whitespace-nowrap min-w-max">
                                <thead class="bg-slate-50 border-b border-slate-200">

                            <div class="md:col-span-2"><label class="block text-sm mb-1">Pilihan Resto</label><select id="setMstResto" class="w-full border border-slate-300 rounded-lg px-3 py-2 set-resto-select"></select></div>

                            <div class="w-full"><label class="block text-xs mb-1">Satuan Kecil</label><input type="text" id="setMstSatK" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Pack"></div>

                        <table class="w-full text-left text-sm whitespace-nowrap min-w-max"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-5 py-3">Kode</th><th class="px-5 py-3">Nama Bahan & Resto</th><th class="px-5 py-3">Kategori</th><th class="px-5 py-3 text-center">Konversi</th><th class="px-5 py-3 text-center">Aksi</th></tr></thead><tbody id="tblMasterList" class="divide-y divide-slate-100"></tbody></table>

    <script>
        // --- REAL STATE MANAGEMENT ---
        const State = {
            user: null, settings: {}, restos: [], users: [], masterData: [], stockData: [],
            inHistory: [], outHistory: [], adjustments: [],
            currentView: 'dashboard', transactionType: 'inbound',
            
            // Checkbox Filter State for Dashboard, Datatable & Scan History
            selectedRestosDash: [], selectedRestosData: [], selectedRestosScan: [],
            
            // UI Table States
            tableData: [], filteredData: [], currentPage: 1, itemsPerPage: 10, tableConfig: {},
            scanHistFiltered: [], scanHistPage: 1,
            
            // Dashboard Recent History Pagination State
            dashRecentData: [], dashRecentPage: 1,

            // WMS Feature State
            suratJalanList: [], 
            sjCart: [] 
        };

        // === Konfigurasi API URL ===
        const API_URL = "https://script.google.com/macros/s/AKfycbyDhgrBBV_9ns7pMjh0d1nWABnNTSyfiIo22hJNyjRyRYK9ZMALnt72XQH5VzcFf6PR/exec";

        // Fungsi komunikasi dengan Google Apps Script via API Fetch
        const runGas = async (func, ...args) => {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: func, args: args }),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    }
                });
                
                const json = await response.json();
                if (json.success) {
                    return json.data;
                } else {
                    throw new Error(json.error || "Terjadi kesalahan pada server Google Script.");
                }
            } catch (error) {
                console.error("API Fetch Error:", error);
                throw error;
            }
        };

        // --- INIT & BOOTSTRAP ---
        document.addEventListener('DOMContentLoaded', () => {
            updateClock(); setInterval(updateClock, 1000);
            document.getElementById('sjDate') ? document.getElementById('sjDate').valueAsDate = new Date() : null;

            runGas('getAppData').then(data => {
                syncLocalState(data);
                State.selectedRestosDash = [...State.restos]; 
                State.selectedRestosData = [...State.restos];
                State.selectedRestosScan = [...State.restos];

                const savedUser = localStorage.getItem('inv_saved_username');
                const savedPass = localStorage.getItem('inv_saved_password');
                if (savedUser && savedPass) {
                    document.getElementById('username').value = savedUser;
                    document.getElementById('password').value = savedPass;
                    document.getElementById('rememberMe').checked = true;
                }
                
                document.getElementById('globalLoader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('globalLoader').classList.add('hidden');
                    document.getElementById('loginScreen').classList.remove('hidden');
                    applySettings();
                }, 500);
            }).catch(e => { document.getElementById('globalLoader').innerHTML = `<p class="text-red-500 font-bold">Gagal menghubungkan ke Database! Pastikan API URL sudah benar.</p>`; });
        });

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#wrap-filter-resto-dash')) { const dd = document.getElementById('dd-dash-resto'); if(dd) dd.classList.add('hidden'); }
            if(!e.target.closest('#wrap-filter-resto-data')) { const dd = document.getElementById('dd-data-resto'); if(dd) dd.classList.add('hidden'); }
            if(!e.target.closest('#wrap-filter-resto-scan')) { const dd = document.getElementById('dd-scan-resto'); if(dd) dd.classList.add('hidden'); }
            
            // Close dropdown bahan saat klik area luar
            if(!e.target.closest('#wrapBahanDropdown') && !e.target.closest('#wrapSjDropdown') && !e.target.closest('#scannerModal')) { 
                const dd1 = document.getElementById('listBahanDropdown_frm'); if(dd1) dd1.classList.add('hidden'); 
                const dd2 = document.getElementById('listBahanDropdown_sj'); if(dd2) dd2.classList.add('hidden'); 
            }
        });

        // Tangani enter di form search bahan (Multipurpose via prefix)
        document.addEventListener('keydown', (e) => {
            if(e.target && e.key === 'Enter') {
                let prefix = '';
                if (e.target.id === 'frmSearchBahan') prefix = 'frm';
                else if (e.target.id === 'sjSearchBahan') prefix = 'sj';
                
                if (prefix) {
                    e.preventDefault();
                    const list = document.getElementById(`listBahanDropdown_${prefix}`);
                    if(list && !list.classList.contains('hidden')) {
                        const visibleItems = Array.from(list.getElementsByTagName('li')).filter(li => li.style.display !== 'none');
                        if (visibleItems.length > 0) visibleItems[0].click();
                    }
                }
            }
        });

        function toggleDropdown(id) {
            const dd = document.getElementById(id); if(dd) dd.classList.toggle('hidden');
        }

        // FUNGSI SINKRONISASI - Diberi fallback object aman
        function syncLocalState(data, keepLocalStock = false) {
            if (!data || typeof data !== 'object') return; // Mencegah blank karena error undefined

            State.settings = data.settings || State.settings || {}; 
            State.restos = data.restos || State.restos || []; 
            State.users = data.users || State.users || [];
            State.masterData = data.master || State.masterData || []; 
            
            if (!keepLocalStock) {
                let rawStock = data.stock || [];
                let groupedStock = {};
                
                rawStock.forEach(s => {
                    let kb = String(s.KodeBahan || s['Kode Bahan'] || s.kode_bahan || '').trim();
                    let nm = String(s.NamaBahan || s['Nama Bahan'] || s.nama_bahan || '').trim();
                    let kat = String(s.Kategori || s.kategori || '').trim();
                    let rs = String(s.Resto || s.Lokasi || s.resto || '').trim();
                    
                    let kl = String(s.KodeLot || s['Kode Lot'] || s.Lot || s.lot || '').trim();
                    let kp = String(s.KodeProduksi || s['Kode Produksi'] || s.Produksi || s.produksi || '').trim();
                    let ke = String(s.ExpDate || s['Expired Date'] || s['Exp Date'] || s.Expired || s.exp || '').trim();
                    
                    if (kl === '') kl = '-';
                    if (kp === '') kp = '-';
                    if (ke === '') ke = '-';
                    
                    let key = `${kb.toUpperCase()}_${rs.toUpperCase()}_${kl.toUpperCase()}_${kp.toUpperCase()}_${ke.toUpperCase()}`;
                    
                    if(!groupedStock[key]) {
                        groupedStock[key] = {
                            KodeBahan: kb, NamaBahan: nm || s.NamaBahan, Kategori: kat || s.Kategori, Resto: rs, 
                            QtyKecil: s.QtyKecil || s['Stock Kecil'] || s.Qty || '', 
                            QtyBesar: s.QtyBesar || s['Stock Besar'] || '', 
                            KodeLot: kl, KodeProduksi: kp, ExpDate: ke
                        };
                    } else {
                        let currKecilStr = String(groupedStock[key].QtyKecil || '');
                        let addKecilStr = String(s.QtyKecil || s['Stock Kecil'] || s.Qty || '');
                        
                        let currKecil = parseFloat(currKecilStr.replace(/[^0-9.-]+/g,"")) || 0;
                        let addKecil = parseFloat(addKecilStr.replace(/[^0-9.-]+/g,"")) || 0;
                        let totalKecil = currKecil + addKecil;
                        
                        let satuanKecil = addKecilStr.replace(/[0-9.\-]/g, '').trim() || currKecilStr.replace(/[0-9.\-]/g, '').trim();
                        let satuanBesar = String(groupedStock[key].QtyBesar || '').replace(/[0-9.\-]/g, '').trim() || String(s.QtyBesar).replace(/[0-9.\-]/g, '').trim();
                        
                        let masterItem = State.masterData.find(m => String(m.KodeBahan).trim().toUpperCase() === kb.toUpperCase());
                        let konversi = masterItem ? parseFloat(masterItem.Konversi) : 1;
                        let totalBesar = (totalKecil / konversi).toFixed(2);
                        
                        groupedStock[key].QtyKecil = `${totalKecil} ${satuanKecil}`;
                        groupedStock[key].QtyBesar = `${totalBesar} ${satuanBesar}`;
                    }
                });
                
                State.stockData = Object.values(groupedStock).filter(s => {
                    let currentQty = parseFloat(String(s.QtyKecil).replace(/[^0-9.-]+/g,"")) || 0;
                    return currentQty > 0;
                });
            }

            State.inHistory = data.inbound || State.inHistory || []; 
            State.outHistory = data.outbound || State.outHistory || []; 
            State.adjustments = data.adjustments || State.adjustments || [];
            State.suratJalanList = data.suratJalan || State.suratJalanList || []; // Sync SJ Data
        }

        function refreshGlobalData(btn) {
            let originalHtml = '';
            if (btn) {
                originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> Memuat...`;
                btn.disabled = true;
            } else {
                Swal.fire({title: 'Memperbarui data...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            }

            runGas('getAppData').then(data => {
                syncLocalState(data, false); 
                
                if (State.currentView === 'dashboard') {
                    refreshDashboard();
                } else if (State.currentView === 'inbound' || State.currentView === 'outbound') {
                    filterScanHistory();
                    setupDropdownBahan('frm'); // Perbarui dropdown dengan Master Data terbaru
                } else if (State.currentView === 'settings') {
                    renderRestoTable(); 
                    renderUserTable(); 
                    renderMasterTable();
                } else if (State.currentView === 'pengiriman') {
                    setupDropdownBahan('sj');
                } else {
                    if (State.currentView === 'database') {
                        State.tableData = State.user.role === 'Admin' ? State.stockData : State.stockData.filter(s => s.Resto === State.user.resto);
                    } else if (State.currentView === 'expired') {
                        const today = new Date();
                        const processed = State.stockData.filter(s => s.ExpDate && s.ExpDate !== '-').map(s => {
                            const expD = new Date(s.ExpDate);
                            const diffDays = Math.ceil((expD - today) / (1000 * 60 * 60 * 24));
                            let status = 'Aman';
                            if (diffDays <= 0) status = 'Expired'; else if (diffDays <= 30) status = 'Warning';
                            return {...s, SisaHari: diffDays, Status: status};
                        });
                        processed.sort((a,b) => a.SisaHari - b.SisaHari);
                        State.tableData = State.user.role === 'Admin' ? processed : processed.filter(s => s.Resto === State.user.resto);
                    } else if (State.currentView === 'adjustment') {
                        State.tableData = State.user.role === 'Admin' ? State.adjustments : State.adjustments.filter(s => s.Resto === State.user.resto);
                    }
                    filterTable();
                }

                if (btn) {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                } else {
                    Swal.close();
                }
                Swal.fire({icon: 'success', title: 'Data Terbaru Berhasil Dimuat', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
            }).catch(e => {
                if (btn) {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                } else {
                    Swal.close();
                }
                Swal.fire('Error', 'Gagal memuat ulang data terbaru', 'error');
            });
        }

        function updateClock() {
            const now = new Date(); document.getElementById('realtimeClock').textContent = now.toLocaleTimeString('id-ID');
            let greeting = 'Selamat Pagi'; const h = now.getHours();
            if(h >= 11 && h < 15) greeting = 'Selamat Siang'; else if(h >= 15 && h < 18) greeting = 'Selamat Sore'; else if(h >= 18) greeting = 'Selamat Malam';
            if(State.user) document.getElementById('greetingText').textContent = `${greeting}, ${State.user.name.split(' ')[0]}`;
        }

        const Menus = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard', roles: ['Admin', 'Admin Warehouse', 'Manager', 'Store Manager', 'Stocker'] },
            { id: 'pengiriman', icon: 'fa-truck-arrow-right', label: 'Pengiriman Barang', roles: ['Admin', 'Admin Warehouse'] },
            { id: 'database', icon: 'fa-database', label: 'Database Stock', roles: ['Admin', 'Admin Warehouse', 'Manager', 'Store Manager', 'Stocker'] },
            { id: 'inbound', icon: 'fa-boxes-packing', label: 'Barang Masuk', roles: ['Admin', 'Manager', 'Store Manager', 'Stocker'] },
            { id: 'outbound', icon: 'fa-truck-fast', label: 'Barang Keluar', roles: ['Admin', 'Admin Warehouse', 'Manager', 'Store Manager', 'Stocker'] },
            { id: 'expired', icon: 'fa-triangle-exclamation', label: 'Expired Bahan', roles: ['Admin', 'Manager', 'Store Manager', 'Stocker'] },
            { id: 'adjustment', icon: 'fa-scale-balanced', label: 'Adjustment', roles: ['Admin', 'Store Manager'] },
            { id: 'settings', icon: 'fa-gear', label: 'Settings', roles: ['Admin'] }
        ];

        function applySettings() {
            document.getElementById('loginTitle').textContent = State.settings.app_title || 'Inventory Login';
            document.title = State.settings.app_title || 'Indi Apps';
            
            const logoUrl = State.settings.logo_url || 'https://s6.imgcdn.dev/YfkbUy.png';
            document.getElementById('loginLogo').src = logoUrl;
            document.getElementById('appLogo').src = logoUrl;
            document.getElementById('mobileAppLogo').src = logoUrl;
            
            const favicon = document.getElementById('dynamicFavicon');
            if (favicon) { favicon.href = logoUrl; }

        function handleLogin() {
            const u = document.getElementById('username').value; const p = document.getElementById('password').value;
            const isRemembered = document.getElementById('rememberMe').checked;

            if(!u || !p) return Swal.fire({icon: 'warning', title: 'Oops...', text: 'Username dan Password wajib diisi!'});
            const btn = document.getElementById('btnLogin'); btn.innerHTML = `<div class="loader" style="width: 20px; height: 20px; border-width: 3px;"></div>`; btn.disabled = true;

            runGas('loginUser', u, p).then(res => {
                btn.innerHTML = `<span>Masuk</span>`; btn.disabled = false;
                if(res.success) {
                    if(isRemembered) {
                        localStorage.setItem('inv_saved_username', u);
                        localStorage.setItem('inv_saved_password', p);
                    } else {
                        localStorage.removeItem('inv_saved_username');
                        localStorage.removeItem('inv_saved_password');
                    }

                    State.user = res.user;
                    // Jika admin / warehouse, akses semua resto. 
                    const r = (State.user.role === 'Admin' || State.user.role === 'Admin Warehouse') ? [...State.restos] : [State.user.resto];
                    State.selectedRestosDash = [...r]; State.selectedRestosData = [...r]; State.selectedRestosScan = [...r];

                    document.getElementById('sideUserName').textContent = res.user.name;
                    document.getElementById('sideUserRole').textContent = res.user.role;
                    document.getElementById('headerRestoName').textContent = res.user.resto;
                    document.getElementById('loginScreen').style.opacity = '0';
                    setTimeout(() => { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); navigate('dashboard'); }, 300);
                    Swal.fire({ icon: 'success', title: `Selamat Datang, ${res.user.name}`, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                } else Swal.fire({icon: 'error', title: 'Login Gagal', text: 'Username atau Password salah!'});
            }).catch(e => { btn.innerHTML = `<span>Masuk</span>`; btn.disabled = false; Swal.fire({icon: 'error', title: 'Error Koneksi', text: 'Gagal terhubung dengan server!'});});
        }

            const listEl = document.getElementById(`list-${prefix}-resto`);

            else if(prefix === 'data') stateArray = State.selectedRestosData;
            else if(prefix === 'scan') stateArray = State.selectedRestosScan;
            
            const isAll = stateArray.length === State.restos.length;

            let html = `<label class="flex items-center space-x-2 p-2 hover:bg-slate-50 rounded cursor-pointer transition">
                <input type="checkbox" id="chk-all-${prefix}" value="All" ${isAll ? 'checked' : ''} onchange="handleRestoCheckAll('${prefix}', '${callbackName}')" class="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer">
                <span class="text-sm font-bold text-slate-800">Pilih Semua</span>

        function refreshDashboard() {

                const fIn = State.inHistory.filter(t => filterDataLogic(t.Tanggal, t.Resto, sDate, eDate, selRestos));
                const fOut = State.outHistory.filter(t => filterDataLogic(t.Tanggal, t.Resto, sDate, eDate, selRestos));
                const fStock = State.stockData.filter(s => selRestos.length === 0 || selRestos.includes(s.Resto));

                let inStats = {}; let outStats = {}; let f=0; let d=0;
                fIn.forEach(trx => inStats[trx.Satuan] = (inStats[trx.Satuan]||0) + parseInt(trx.Qty));
                fOut.forEach(trx => outStats[trx.Satuan] = (outStats[trx.Satuan]||0) + Math.abs(parseInt(trx.Qty)));
                fStock.forEach(s => { if(s.Kategori==='Frozen') f++; else d++; });

                const formatHtml = (stats) => {
                    const ent = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
                    if(ent.length === 0) return `<h3 class="text-3xl font-bold mb-1">0 <span class="text-sm font-normal text-white/80">Item</span></h3>`;
                    return `<h3 class="text-2xl font-bold mb-0.5">${ent[0][1]} <span class="text-sm font-normal text-white/90">${ent[0][0]}</span></h3>` + 
                           (ent.length>1 ? `<p class="text-xs opacity-90 text-white/80 font-medium">${ent.slice(1).map(x=>`${x[1]} ${x[0]}`).join(', ')}</p>` : '');
                };

                document.getElementById('dashTotalInUnits').innerHTML = formatHtml(inStats);
                document.getElementById('dashTotalOutUnits').innerHTML = formatHtml(outStats);
                document.getElementById('dashFrozenCount').innerHTML = `${f} <span class="text-sm font-normal">Item</span>`;
                document.getElementById('dashDryCount').innerHTML = `${d} <span class="text-sm font-normal">Item</span>`;

                if (State.user.role === 'Admin Warehouse') {

                    document.querySelectorAll('.wh-only-card').forEach(el => el.classList.remove('hidden'));

                    document.getElementById('dashSjDoneCount').innerHTML = `${sjSelesai} <span class="text-sm font-normal">Dokumen</span>`;

                    document.querySelectorAll('.wh-only-card').forEach(el => el.classList.add('hidden'));

                State.dashRecentData = [...fIn.map(x=>({...x, t:'IN'})), ...fOut.map(x=>({...x, t:'OUT'}))]

        function filterDataLogic(dateStr, restoStr, sDate, eDate, selRestos) {
            let matchDate = true; let matchResto = true;
            if(dateStr) {
                const dateOnly = dateStr.split(' ')[0];
                if(sDate && dateOnly < sDate) matchDate = false;
                if(eDate && dateOnly > eDate) matchDate = false;
            }
            if(selRestos.length > 0 && !selRestos.includes(restoStr)) matchResto = false;
            return matchDate && matchResto;
        }

            const ctxM = document.getElementById('mainChart').getContext('2d');
            mainChartInst = new Chart(ctxM, {

            });

            pieChartInst = new Chart(ctxP, {

            });

        function updateChartsWithData(inData, outData, countFrozen, countDry, chartFilter, chartTypeFilter) {
            if(pieChartInst) {
                pieChartInst.data.datasets[0].data = [countFrozen, countDry];
                pieChartInst.update();
            }

            if(!mainChartInst) return;
            
            let dateLabels = [];
            const today = new Date();
            let daysLimit = 7;
            if(chartFilter === 'today') daysLimit = 1;
            else if(chartFilter === '1month') daysLimit = 30;

            for(let i = daysLimit - 1; i >= 0; i--) {
                const d = new Date(today); d.setDate(today.getDate() - i);
                dateLabels.push(d.toISOString().split('T')[0]);
            }

            let inGroup = {}; let outGroup = {};
            dateLabels.forEach(d => { inGroup[d] = 0; outGroup[d] = 0; });

            inData.forEach(r => {
                const d = r.Tanggal.split(' ')[0];
                if(inGroup[d] !== undefined) inGroup[d] += Math.abs(parseFloat(r.Qty) || 1);
            });
            outData.forEach(r => {
                const d = r.Tanggal.split(' ')[0];
                if(outGroup[d] !== undefined) outGroup[d] += Math.abs(parseFloat(r.Qty) || 1);
            });

            const displayLabels = dateLabels.map(d => {
                const parts = d.split('-'); return `${parts[2]}/${parts[1]}`;
            });

            mainChartInst.data.labels = displayLabels;
            mainChartInst.data.datasets[0].data = dateLabels.map(d => inGroup[d]);
            mainChartInst.data.datasets[1].data = dateLabels.map(d => outGroup[d]);
            
            mainChartInst.data.datasets[0].hidden = (chartTypeFilter === 'out');
            mainChartInst.data.datasets[1].hidden = (chartTypeFilter === 'in');

            mainChartInst.update();
        }

        // --- FUNGSI KAMERA SCANNER (MULTI-PURPOSE) ---
        let html5QrCode = null;
        let activeScannerTarget = ''; // 'frm' (Manual Form), 'sj' (Cart SJ), 'sj_number' (Input No SJ), 'inbound_sj' (Cari SJ)

        function openScanner(targetPrefix) {
            activeScannerTarget = targetPrefix;
            const modal = document.getElementById('scannerModal');
            modal.classList.remove('hidden');

            const instruct = document.getElementById('scannerInstruction');
            if(targetPrefix === 'sj_number' || targetPrefix === 'inbound_sj') {
                instruct.textContent = "Arahkan kamera ke Barcode / QR Code Nomor Surat Jalan.";
            } else {
                instruct.textContent = "Arahkan kamera ke Barcode / QR Code Bahan.";
            }

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
            .catch((err) => {
                Swal.fire('Error', 'Tidak dapat mengakses kamera, periksa izin kamera pada browser Anda.', 'error');
                closeScanner();
            });
        }

        function closeScanner() {
            const modal = document.getElementById('scannerModal');
            if(modal) modal.classList.add('hidden');
            
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch((err) => console.log("Failed to stop scanner", err));
            }
            activeScannerTarget = '';
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Hentikan scanner dengan aman sebelum memanipulasi DOM/SweetAlert
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    processScanResult(decodedText);
                }).catch(err => {
                    console.log(err);
                    processScanResult(decodedText); // Tetap lanjut meskipun gagal stop stream
                });
            } else {
                processScanResult(decodedText);
            }
        }

        function processScanResult(decodedText) {
            const modal = document.getElementById('scannerModal'); 
            if(modal) modal.classList.add('hidden');
            playBeep(); 
            
            const text = String(decodedText).trim().toUpperCase();
            
            if(State.scannerTarget === 'sj_number_out') {
                document.getElementById('sjNumber').value = text;
                return;
            } else if (State.scannerTarget === 'sj_number_in') {
                document.getElementById('inboundSearchSj').value = text; 
                searchSjToReceive();
                return;
            }

            // Menentukan prefix form tujuan berdasarkan target tombol scanner
            let prefix = 'frm'; // Default ke form input manual
            if (State.scannerTarget === 'item_sj') prefix = 'sj';
            else if (State.scannerTarget === 'item_manual') prefix = 'frm';

            // Dapatkan Resto yang sedang aktif di form tersebut
            let selectedResto = '';
            const restoElement = document.getElementById(prefix === 'sj' ? 'sjResto' : 'frmResto');
            if (restoElement) selectedResto = restoElement.value.trim().toUpperCase();
            
            if (!selectedResto && State.user) {
                selectedResto = State.user.resto.toUpperCase();
            }

            // Cari bahan di Master Data yang sesuai dengan Barcode dan Resto
            const item = State.masterData.find(m => 
                String(m.KodeBahan).trim().toUpperCase() === text && 
                (selectedResto === '' || String(m.Resto).trim().toUpperCase() === selectedResto || String(m.Resto).trim().toUpperCase() === 'SEMUA RESTO')
            );

            if (item) {
                // Panggil fungsi selectBahan dengan 3 argumen yang benar (kode, nama, prefix_form)
                selectBahan(item.KodeBahan, item.NamaBahan.replace(/'/g, "\\'"), prefix);
            } else {
                Swal.fire({icon:'warning', title:'Tidak Ditemukan', text:`Barcode [${text}] tidak terdaftar di Master Data untuk resto ini.`, toast:true, position:'top', timer:3500});
            }
        }

        function onScanFailure(error) {
            // Ignore
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch (e) {}
        }


        // --- CUSTOM DROPDOWN BAHAN LOGIC (SUPPORT PREFIX) ---
        function setupDropdownBahan(prefix) {
            let resto = '';
            if (prefix === 'frm') resto = document.getElementById('frmResto') ? document.getElementById('frmResto').value : '';
            else if (prefix === 'sj') resto = document.getElementById('sjResto') ? document.getElementById('sjResto').value : '';

            const list = document.getElementById(`listBahanDropdown_${prefix}`);
            if (!list) return;

            let options = State.masterData;
            
            if(resto && resto !== 'Semua Resto') {
               options = State.masterData.filter(m => String(m.Resto).trim().toUpperCase() === String(resto).trim().toUpperCase() || String(m.Resto).trim().toUpperCase() === 'SEMUA RESTO');
            }
            
            if (options.length === 0) {
                list.innerHTML = `<li class="px-4 py-3 text-sm text-slate-400 text-center italic">Tidak ada bahan di Resto ini.</li>`;
            } else {
                list.innerHTML = options.map(m => `
                    <li onclick="selectBahan('${m.KodeBahan}', '${m.NamaBahan.replace(/'/g, "\\'")}', '${prefix}')" class="px-4 py-2.5 hover:bg-blue-50 cursor-pointer text-sm border-b border-slate-50 last:border-0 transition-colors">
                        <span class="font-bold text-blue-600 font-mono">${m.KodeBahan}</span> - <span class="text-slate-700 font-medium">${m.NamaBahan}</span>
                    </li>
                `).join('');
            }
        }

        function showDropdownBahan(prefix) {
            setupDropdownBahan(prefix);
            filterDropdownBahan(prefix);
            const list = document.getElementById(`listBahanDropdown_${prefix}`);
            if(list) list.classList.remove('hidden');
        }

        function toggleDropdownBahan(prefix) {
            const list = document.getElementById(`listBahanDropdown_${prefix}`);
            if(!list) return;
            if(list.classList.contains('hidden')) showDropdownBahan(prefix);
            else list.classList.add('hidden');
        }

        function filterDropdownBahan(prefix) {
            const inputElement = document.getElementById(`${prefix}SearchBahan`);
            if(!inputElement) return;
            const input = inputElement.value.toLowerCase();
            const list = document.getElementById(`listBahanDropdown_${prefix}`);
            if(!list) return;
            
            const items = list.getElementsByTagName('li');
            for(let i=0; i < items.length; i++) {
                if(items[i].classList.contains('italic')) continue;

        // Logic saat bahan dipilih dari dropdown
        function processBahanSelection(scanText, prefix) {
            let selectedResto = '';
            if (prefix === 'frm') selectedResto = document.getElementById('frmResto').value.trim().toUpperCase();
            else if (prefix === 'sj') selectedResto = document.getElementById('sjResto').value.trim().toUpperCase();

            const item = State.masterData.find(m => String(m.KodeBahan).trim().toUpperCase() === scanText && (String(m.Resto).trim().toUpperCase() === selectedResto || String(m.Resto).trim().toUpperCase() === 'SEMUA RESTO'));
            
            if(item) {
                if(document.getElementById(`${prefix}NamaBahan`)) document.getElementById(`${prefix}NamaBahan`).value = item.NamaBahan;
                if(document.getElementById(`${prefix}Kategori`)) document.getElementById(`${prefix}Kategori`).value = item.Kategori;
                
                const sel = document.getElementById(`${prefix}Satuan`);
                if(sel) {
                    sel.innerHTML = `<option value="${item.SatuanBesar}">${item.SatuanBesar}</option><option value="${item.SatuanKecil}">${item.SatuanKecil}</option>`;
                    sel.disabled = false;
                }
                
                // Khusus Form Outbound Manual (Bukan SJ)
                if(prefix === 'frm' && State.transactionType === 'outbound') {
                    const stocks = State.stockData.filter(s => String(s.KodeBahan).trim().toUpperCase() === scanText && String(s.Resto).trim().toUpperCase() === selectedResto);
                    
                    let uLots = [...new Set(stocks.map(s => s.KodeLot).filter(v => v && v !== '-'))];
                    let uProds = [...new Set(stocks.map(s => s.KodeProduksi).filter(v => v && v !== '-'))];
                    let uExps = [...new Set(stocks.map(s => s.ExpDate).filter(v => v && v !== '-'))];

                    stocks.sort((a, b) => {
                        if (a.ExpDate === '-' && b.ExpDate === '-') return 0;
                        if (a.ExpDate === '-') return 1;
                        if (b.ExpDate === '-') return -1;
                        return new Date(a.ExpDate) - new Date(b.ExpDate);
                    });
                    uExps.sort((a, b) => new Date(a) - new Date(b));

                    if(uLots.length === 0) uLots.push('-'); if(uProds.length === 0) uProds.push('-'); if(uExps.length === 0) uExps.push('-');

                    const formatOpt = (v) => v === '-' ? `<option value="-">-</option>` : `<option value="${v}">${v} (${selectedResto})</option>`;

                    document.getElementById('frmLot').innerHTML = uLots.map(formatOpt).join('');
                    document.getElementById('frmProd').innerHTML = uProds.map(formatOpt).join('');
                    document.getElementById('frmExp').innerHTML = uExps.map(formatOpt).join('');
                    
                    if (stocks.length > 0) {
                        const fefoStock = stocks[0];
                        document.getElementById('frmLot').value = fefoStock.KodeLot || '-';
                        document.getElementById('frmProd').value = fefoStock.KodeProduksi || '-';
                        document.getElementById('frmExp').value = fefoStock.ExpDate || '-';
                    }
                    updateOutboundStockDisplay();
                }

                setTimeout(() => {
                    const qtyInput = document.getElementById(`${prefix}Qty`);
                    if(qtyInput) qtyInput.focus();
                }, 100);

            } else {
                Swal.fire({icon:'warning', title:'Tidak Ditemukan', text:'Kode Master Data tidak valid untuk Resto ini.', toast:true, position:'top', timer:2000});
                if(prefix === 'frm') setTimeout(() => { resetFormUI(true); }, 1500);
            }
        }

        function printSuratJalan(id) {
            const sj = State.suratJalanList.find(s => s.id === id);
            if(!sj) return Swal.fire('Error', 'Data Surat Jalan tidak ditemukan.', 'error');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header SJ
            doc.setFontSize(18);
            doc.text("SURAT JALAN (DELIVERY ORDER)", 14, 20);
            
            doc.setFontSize(10);
            doc.text(`No. Surat Jalan : ${sj.id}`, 14, 30);
            doc.text(`Tanggal         : ${sj.tanggal}`, 14, 35);
            doc.text(`Resto Tujuan    : ${sj.restoTujuan}`, 14, 40);
            doc.text(`Pengirim        : ${sj.pengirim}`, 14, 45);

            // Table SJ
            const headers = [['No', 'Kode Bahan', 'Nama Bahan', 'Qty', 'Satuan', 'Prod Date', 'Exp Date']];
            const body = sj.items.map((item, i) => [
                i + 1, item.kode, item.nama, item.qty, item.satuan, item.produksi || '-', item.exp || '-'
            ]);

            doc.autoTable({
                startY: 55,
                head: headers,
                body: body,
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] },
                styles: { fontSize: 9 }
            });

            // Signatures
            const finalY = doc.lastAutoTable.finalY || 55;
            doc.text("Diterima Oleh,", 30, finalY + 20);
            doc.text("(.........................)", 20, finalY + 45);
            doc.text("Store / Resto", 31, finalY + 50);
            
            doc.text("Dikirim Oleh,", 150, finalY + 20);
            doc.text(`( ${sj.pengirim} )`, 142, finalY + 45);
            doc.text("Admin Warehouse", 148, finalY + 50);

            doc.save(`${sj.id}.pdf`);
        }

        function submitSuratJalan() {
            const noSj = document.getElementById('sjNumber').value.trim().toUpperCase();
            const resto = document.getElementById('sjResto').value;
            const tanggal = document.getElementById('sjDate').value;

            if (!noSj) return Swal.fire('Peringatan', 'Nomor Surat Jalan wajib diisi!', 'warning');
            if (State.sjCart.length === 0) return Swal.fire('Peringatan', 'Keranjang pengiriman masih kosong.', 'warning');

            Swal.fire({
                title: 'Proses Surat Jalan?',
                text: `Akan mengirim ${State.sjCart.length} item ke ${resto}.`,
                icon: 'question', showCancelButton: true, confirmButtonText: 'Proses Pengiriman', confirmButtonColor: '#059669'
            }).then(r => {
                if (r.isConfirmed) {
                    Swal.fire({title: 'Menyimpan Surat Jalan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

                    const tglFormat = tanggal + " " + new Date().toLocaleTimeString('id-ID').substring(0,5);

                    const payloadSj = {
                        id: noSj, restoTujuan: resto, tanggal: tglFormat, pengirim: State.user.name, items: [...State.sjCart], status: 'Dikirim'
                    };

                    runGas('saveSuratJalanData', payloadSj).then(res => {
                        if(res) syncLocalState(res);
                        Swal.fire({
                            title: 'Berhasil', 
                            text: 'Surat Jalan tersimpan dan stok gudang telah dipotong.', 
                            icon: 'success',
                            showCancelButton: true,
                            confirmButtonText: '<i class="fa-solid fa-file-pdf"></i> Cetak PDF',
                            cancelButtonText: 'Tutup'
                        }).then((result) => {
                            if (result.isConfirmed) {
                                printSuratJalan(noSj);
                            }
                        });
                        
                        document.getElementById('sjNumber').value = '';
                        State.sjCart = [];
                        renderSjCart();
                        renderSjHistory();
                    }).catch(e => {
                        // Simulasi jika server belum menerapkan update SJ DB
                        State.suratJalanList.push(payloadSj);
                        let promises = [];
                        State.sjCart.forEach(item => {
                            const outPayload = {
                                kode: item.kode, nama: item.nama, kategori: item.kategori, qty: "-" + item.qty, satuan: item.satuan,
                                lot: '-', produksi: item.produksi, exp: item.exp, petugas: State.user.name, resto: State.user.resto
                            };
                            promises.push(runGas('saveTransaction', 'outbound', outPayload));
                        });

                        Promise.all(promises).then(results => {
                            if(results.length > 0) syncLocalState(results[results.length - 1], false);
                            
                            Swal.fire({
                                title: 'Berhasil (Simulasi)', 
                                text: 'Surat Jalan disimulasikan lokal dan stok telah dipotong.', 
                                icon: 'success', showCancelButton: true, confirmButtonText: 'Cetak PDF', cancelButtonText: 'Tutup'
                            }).then((result) => {
                                if (result.isConfirmed) printSuratJalan(noSj);
                            });
                            
                            document.getElementById('sjNumber').value = ''; State.sjCart = []; renderSjCart(); renderSjHistory();

                        }).catch(err => {
                            Swal.fire('Peringatan', 'Terjadi error API, data disimulasikan lokal.', 'warning');
                            document.getElementById('sjNumber').value = ''; State.sjCart = []; renderSjCart(); renderSjHistory();
                        });
                    });
                }
            });
        }

        function processInboundSj() {
            if (!activeInboundSjData) return;

            // Validasi Lot Input
            let valid = true;
            let finalItemsToProcess = [];

            for (let i = 0; i < activeInboundSjData.items.length; i++) {
                const item = activeInboundSjData.items[i];
                const lotInput = document.getElementById(`inboundLot_${i}`).value.trim().toUpperCase();
                
                if (!lotInput) { valid = false; break; }
                
                finalItemsToProcess.push({
                    kode: item.kode, nama: item.nama, kategori: item.kategori, qty: item.qty, satuan: item.satuan,
                    lot: lotInput, produksi: item.produksi, exp: item.exp, petugas: State.user.name, resto: State.user.resto
                });
            }

            if (!valid) return Swal.fire('Peringatan', 'Mohon isi semua "Kode Lot" untuk setiap bahan.', 'warning');

            Swal.fire({
                title: 'Terima Barang?',
                text: "Semua item dalam Surat Jalan ini akan masuk ke stock.",
                icon: 'question', showCancelButton: true, confirmButtonColor: '#059669', confirmButtonText: 'Ya, Terima'
            }).then(r => {
                if (r.isConfirmed) {
                    Swal.fire({title: 'Memproses Inbound...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

                    runGas('receiveSuratJalanData', { id: activeInboundSjData.id, items: finalItemsToProcess, resto: State.user.resto }).then(res => {
                        if(res) syncLocalState(res);
                        Swal.fire('Sukses', 'Seluruh barang dari Surat Jalan telah diterima dan masuk stock.', 'success');
                        
                        document.getElementById('inboundSearchSj').value = '';
                        document.getElementById('inboundSjResult').classList.add('hidden');
                        activeInboundSjData = null;
                        
                        initScanHistory();
                    }).catch(e => {
                        // Fallback Simulasi jika backend tidak mendukung endpoint
                        let promises = [];
                        finalItemsToProcess.forEach(payload => {
                            promises.push(runGas('saveTransaction', 'inbound', payload));
                        });
                        
                        // Update status lokal
                        const sjIndex = State.suratJalanList.findIndex(s => s.id === activeInboundSjData.id);
                        if (sjIndex > -1) State.suratJalanList[sjIndex].status = 'Diterima';

                        Promise.all(promises).then(results => {
                            if(results.length > 0) syncLocalState(results[results.length - 1], false);
                            Swal.fire('Sukses', 'Seluruh barang dari Surat Jalan telah diterima (Simulasi API).', 'success');
                            
                            document.getElementById('inboundSearchSj').value = ''; document.getElementById('inboundSjResult').classList.add('hidden'); activeInboundSjData = null;
                            initScanHistory();
                        });
                    });
                }
            });
        }

        function handleBatchChange(changedField) {
            if(State.transactionType !== 'outbound') return;
            const kode = document.getElementById('frmKodeBahan').value.trim().toUpperCase();
            const resto = document.getElementById('frmResto').value.trim().toUpperCase();
            
            const lotEl = document.getElementById('frmLot');
            const prodEl = document.getElementById('frmProd');
            const expEl = document.getElementById('frmExp');
            
            if(!lotEl || !prodEl || !expEl || !kode) return;
            
            const lot = lotEl.value;
            const prod = prodEl.value;
            const exp = expEl.value;
            
            let stocks = State.stockData.filter(s => 
                String(s.KodeBahan).trim().toUpperCase() === kode && 
                String(s.Resto).trim().toUpperCase() === resto
            );
            
            stocks.sort((a, b) => {
                if (a.ExpDate === '-' && b.ExpDate === '-') return 0;
                if (a.ExpDate === '-') return 1;
                if (b.ExpDate === '-') return -1;
                return new Date(a.ExpDate) - new Date(b.ExpDate);
            });

            if (changedField === 'lot' && lot !== '-') {
                const matches = stocks.filter(s => String(s.KodeLot).trim().toUpperCase() === String(lot).trim().toUpperCase());
                if(matches.length > 0) {
                    const match = matches[0]; 
                    if(prodEl.querySelector(`option[value="${match.KodeProduksi}"]`)) prodEl.value = match.KodeProduksi;
                    if(expEl.querySelector(`option[value="${match.ExpDate}"]`)) expEl.value = match.ExpDate;
                }
            } else if (changedField === 'prod' && prod !== '-') {
                const matches = stocks.filter(s => String(s.KodeProduksi).trim().toUpperCase() === String(prod).trim().toUpperCase());
                if(matches.length > 0) {
                    const match = matches[0];
                    if(lotEl.querySelector(`option[value="${match.KodeLot}"]`)) lotEl.value = match.KodeLot;
                    if(expEl.querySelector(`option[value="${match.ExpDate}"]`)) expEl.value = match.ExpDate;
                }
            } else if (changedField === 'exp' && exp !== '-') {
                const matches = stocks.filter(s => String(s.ExpDate).trim().toUpperCase() === String(exp).trim().toUpperCase());
                if(matches.length > 0) {
                    const match = matches[0];
                    if(lotEl.querySelector(`option[value="${match.KodeLot}"]`)) lotEl.value = match.KodeLot;
                    if(prodEl.querySelector(`option[value="${match.KodeProduksi}"]`)) prodEl.value = match.KodeProduksi;
                }
            }

            updateOutboundStockDisplay();
        }

        function updateOutboundStockDisplay() {
            if(State.transactionType !== 'outbound') return;
            
            const kode = document.getElementById('frmKodeBahan').value.trim().toUpperCase();
            const resto = document.getElementById('frmResto').value.trim().toUpperCase();
            const lot = document.getElementById('frmLot') ? document.getElementById('frmLot').value.trim().toUpperCase() : '-';
            const prod = document.getElementById('frmProd') ? document.getElementById('frmProd').value.trim().toUpperCase() : '-';
            const exp = document.getElementById('frmExp') ? document.getElementById('frmExp').value.trim().toUpperCase() : '-';
            
            const stock = State.stockData.find(s => 
                String(s.KodeBahan).trim().toUpperCase() === kode && 
                String(s.Resto).trim().toUpperCase() === resto && 
                String(s.KodeLot).trim().toUpperCase() === lot && 
                String(s.KodeProduksi).trim().toUpperCase() === prod && 
                String(s.ExpDate).trim().toUpperCase() === exp
            );

            const selSatuan = document.getElementById('frmSatuan');

            sys.style.transition = 'opacity 0.2s ease-in-out, transform 0.2s ease-in-out';

                    sys.classList.remove('text-slate-800', 'text-slate-400', 'text-rose-500');
                    sys.classList.add('text-blue-600');
                } else {
                    sys.textContent = "0 " + satuanKecil;
